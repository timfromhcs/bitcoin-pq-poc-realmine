##
## BIP-QP-ZIP Bitcoin Core Configuration
## Place this file in your Bitcoin Core data directory (e.g., %APPDATA%\Bitcoin\ on Windows)
## or pass -conf=<path> to bitcoind.
##

# Enable JSON-RPC server
server=1

# RPC authentication credentials
# The miner reads these exact credentials to authenticate against bitcoind
rpcuser=qpzip_admin
rpcpassword=qpzip_secure_password_2024

# Bind RPC to localhost only (secure)
rpcallowip=127.0.0.1
rpcbind=127.0.0.1

# RPC port (mainnet default: 8332)
rpcport=8332

# Enable transaction index for block exploration
txindex=1

# Run as daemon
daemon=1

# BIP-QP-ZIP: Activation height for the soft-fork
# Sets the block height at which Witness Version 2 validation rules become active
# (For mainnet, this would be a future height; for regtest, use height=1)
# qpzipactivationheight=1

# Reduce fallback fee to allow CPFP
fallbackfee=0.0002

# Set maximum number of RPC connections
rpcthreads=4